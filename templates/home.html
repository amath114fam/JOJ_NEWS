{% extends 'base.html' %}

{% block content %}
<div class="text-center">
    <h1 class="text-success">Bienvenue sur JOJ News 🇸🇳</h1>
    <marquee class="lead">Plateforme officielle des Jeux Olympiques de la Jeunesse</marquee>

    {% if user.is_authenticated %}
        <p class="loginText"> Connecté en tant que <strong>{{ user.username }}</strong></p>
    {% else %}
        <p class="loginText">Veuillez vous connecter pour interagir</p>
    {% endif %}
</div>
{% endblock %}
