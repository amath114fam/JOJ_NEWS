{% extends 'base.html' %}

{% block content %}   
    <form method="post" action ="{% url "connexion" %}" class="row gy-4 w-50 mx-auto p-4 shadow rounded bg-white">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        
        <h3 class="text-center text-danger">Connexion</h3>
        {% if form.errors %}
            <p style="color:red;">Veuillez corriger les erreurs.</p>
        {% endif %}
        <div class="col-12">
            <label for="nom" class="form-label">Nom d'utilisateur</label>
            <input type="text" class="form-control" id="nom" name="username">
        </div>
        <div class="col-12">
            <label for="password" class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="password" name="password">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary w-100">Connexion</button>
        </div>
        <div class="col-12">
            <p class="mt-3 text-center">
                <a href="{% url 'password_reset' %}">mot de passe oublié?</a>
                Pas de compte ? 
                <a href="{% url 'inscription' %}">S'inscrire</a>
            </p>
        </div>
    </form>
</div>
{% endblock %}
