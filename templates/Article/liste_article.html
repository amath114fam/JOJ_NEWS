{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row g-5">
        {% for article in articles %}
        <div class="col-12 col-md-6 col-lg-4">
            <div class="rounded-2 bg-primary p-3 d-flex justify-content-center align-items-center">
                <a href="{% url "detail_article" article.id %}" class="text-white fw-bold "> {{article.titre}} </a>
            </div>
        </div>
       {% endfor %}
    </div>
</div>
{% endblock %}
