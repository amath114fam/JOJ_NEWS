{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h2 class="mb-4">Actualités JOJ</h2>

    <div class="row">
        {% for article in articles %}
        <div class="col-md-4">
            <div class="card mb-4 shadow">
                <div class="card-body">
                    <h5 class="card-title">{{ article.categorie }}</h5>
                    <p class="card-text">
                        {{ article.contenu|truncatewords:20 }}
                    </p>

                    <a href="{% url 'detail_article' article.id %}" 
                       class="btn btn-primary">
                        Lire plus
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
