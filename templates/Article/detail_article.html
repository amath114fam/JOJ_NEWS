{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">
        <h2>{{ article.titre }}</h2>

        <p class="text-muted">
            Par {{ article.auteur }} | {{ article.date_creation }}
        </p>

        <hr>

        <p>{{ article.contenu }}</p>

        <a href="{% url 'liste_articles' %}" class="btn btn-secondary mt-3">
            ← Retour
        </a>
    </div>

</div>

{% endblock %}
