{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <div class="card shadow mb-4">
        <div class="card-body">
            <h3 class="card-title text-primary">Modifier votre commentaire</h3>
            <hr>
            <p class="text-muted">Commentaire actuel :</p>
            <div class="card mb-3">
                <div class="card-body">
                    {{ form.instance.contenu }}
                </div>
            </div>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="{% url 'detail_article' id=form.instance.article.id %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
    </div>

</div>
{% endblock %}
