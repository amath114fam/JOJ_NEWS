{% extends 'base.html' %}

{% block content %}
<form action="{% url "inscription" %}" method="post"  class="row gy-4 w-50 mx-auto p-4 shadow rounded bg-white">
    {% csrf_token %}
    {% if form.errors %}
        <p style="color:red;">Veuillez corriger les erreurs.</p>
    {% endif %}
    <div class="col-12">
        <label for="nom" class="form-label">Nom d'utilisateur</label>
        <input type="text" class="form-control" id="nom" name="username">
    </div>
    <div class="col-12">
        <label for="password1" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password1" name="password1">
    </div>
    <div class="col-12">
        <label for="password2" class="form-label">Confirmer le mot de passe</label>
        <input type="password" class="form-control" id="password2" name="password2">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
    </div>
</form>
{% endblock %}
